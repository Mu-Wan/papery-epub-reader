<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f1ec" />
    <title>页间 · EPUB 阅读器</title>
    <link rel="icon" href="/src/assets/app-mark.svg" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/library.css" />
    <link rel="stylesheet" href="/src/styles/heatmap.css" />
    <link rel="stylesheet" href="/src/styles/dialogs.css" />
    <link rel="stylesheet" href="/src/styles/titlebar.css" />
    <link rel="stylesheet" href="/src/styles/reader.css" />
  </head>
  <body>
    <header id="appTitlebar" class="app-titlebar" data-tauri-drag-region>
      <div class="titlebar-brand" data-tauri-drag-region>
        <img src="/src/assets/app-mark.svg" alt="" draggable="false" />
        <span data-tauri-drag-region>页间 · EPUB 阅读器</span>
      </div>
      <div class="window-controls">
        <button id="minimizeButton" aria-label="最小化"><i class="minimize-icon"></i></button>
        <button id="maximizeButton" aria-label="最大化或还原"><i class="maximize-icon"></i></button>
        <button id="closeButton" class="close-control" aria-label="关闭"><i class="close-icon"></i></button>
      </div>
    </header>
    <div class="app-shell">
      <main id="libraryView" class="library-view">
      <header class="library-header">
        <div>
          <p class="eyebrow">PAPERY READER</p>
          <h1>页间</h1>
          <p class="subtitle">一个安静、轻巧的本地 EPUB 与 TXT 书架。</p>
        </div>
        <div class="header-actions">
          <details class="backup-menu"><summary class="quiet-button">管理</summary><div>
            <button id="exportButton" type="button">导出备份</button>
            <button id="importBackupButton" type="button">合并恢复</button>
            <button id="overwriteBackupButton" type="button">覆盖恢复</button>
          </div></details>
          <label class="primary-button" for="bookInput">＋ 添加书籍</label>
        </div>
        <input id="bookInput" type="file" accept=".epub,.txt,application/epub+zip,text/plain" multiple hidden />
        <input id="backupInput" type="file" accept=".zip,application/zip" hidden />
      </header>
      <section class="heatmap-section" aria-labelledby="heatmapTitle">
        <div class="heatmap-heading"><div><p class="eyebrow">READING YEAR</p><h2 id="heatmapTitle">阅读足迹</h2></div><p id="heatmapSummary">过去一年 0 分钟</p></div>
        <div class="heatmap-chart">
          <div id="heatmapYears" class="heatmap-years" aria-hidden="true"></div>
          <div id="heatmapMonths" class="heatmap-months" aria-hidden="true"></div>
          <div class="heatmap-weekdays" aria-hidden="true"><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span></div>
          <div id="heatmap" class="heatmap" aria-label="过去一年的阅读热力图"></div>
        </div>
        <div class="heatmap-legend"><span>少</span><i data-level="0"></i><i data-level="1"></i><i data-level="2"></i><i data-level="3"></i><i data-level="4"></i><span>多</span></div>
      </section>
      <nav id="shelfTabs" class="shelf-tabs" aria-label="书架分类">
        <button data-view="reading">在读</button>
        <button class="active" data-view="library">书架</button>
        <button data-view="finished">已完成</button>
      </nav>
      <section class="shelf-section" aria-labelledby="shelfTitle">
        <div class="section-heading">
          <div class="shelf-title-row"><button id="boxBackButton" class="box-back" type="button" aria-label="返回主书架" hidden>←</button><h2 id="shelfTitle">我的书架</h2></div>
          <div class="section-meta"><span id="bookCount" class="book-count">0 本</span><button id="createBoxButton" class="quiet-button" hidden>＋ 新建书盒</button></div>
        </div>
        <div id="emptyState" class="empty-state">
          <div class="empty-mark">阅</div>
          <h3>书架还是空的</h3>
          <p>添加一本本地 EPUB 或 TXT，书籍和阅读进度只保存在这台设备上。</p>
          <label class="secondary-button" for="bookInput">选择本地文件</label>
        </div>
        <div id="boxGrid" class="box-grid" hidden></div>
        <div id="bookGrid" class="book-grid"></div>
      </section>
      </main>

      <main id="readerView" class="reader-view" hidden>
      <header class="reader-header">
        <button id="backButton" class="icon-button back-button" aria-label="返回书架">←</button>
        <div class="reader-title-wrap">
          <strong id="readerTitle">书名</strong>
          <span id="readerProgress">准备中</span>
        </div>
        <button id="settingsButton" class="text-button" aria-expanded="false">排版</button>
      </header>
      <aside id="settingsPanel" class="settings-panel" hidden>
        <label><span>字号 <output id="fontSizeOutput">18</output></span><input id="fontSize" type="range" min="14" max="28" step="1" /></label>
        <label><span>行距 <output id="lineHeightOutput">1.8</output></span><input id="lineHeight" type="range" min="1.3" max="2.4" step="0.1" /></label>
        <label><span>四周边距 <output id="marginOutput">48</output></span><input id="margin" type="range" min="16" max="96" step="8" /></label>
        <div class="setting-row"><span>字体</span><div id="fontChoices" class="font-choices"></div></div>
        <div class="setting-row"><span>纸色</span><div id="paperChoices" class="paper-choices"></div></div>
        <div class="setting-row"><span>纸质</span><div id="textureChoices" class="texture-choices"></div></div>
      </aside>
      <section id="readerStage" class="reader-stage" aria-label="电子书正文">
        <button id="prevButton" class="page-zone prev-zone" aria-label="上一页">‹</button>
        <div id="viewer" class="viewer"></div>
        <button id="nextButton" class="page-zone next-zone" aria-label="下一页">›</button>
      </section>
      <footer class="reader-footer">滚轮、左右方向键或点击两侧翻页</footer>
      </main>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
      <dialog id="boxDialog" class="app-dialog">
        <form method="dialog">
          <p class="dialog-eyebrow">整理书架</p><h2>移入书盒</h2>
          <p id="boxDialogBook" class="dialog-copy"></p>
          <select id="boxSelect" aria-label="选择书盒"></select>
          <div class="dialog-actions"><button value="cancel" class="quiet-button">取消</button><button id="boxDialogConfirm" value="confirm" class="primary-button">确认</button></div>
        </form>
      </dialog>
    </div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
